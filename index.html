<!DOCTYPE html>
<html>
<head>
  <title>Petzify</title>
</head>
<body>
  <p>Redirecting...</p>

  <script>
    function redirectToStore() {
      const userAgent = navigator.userAgent || navigator.vendor || window.opera;

      const playStoreUrl =
        "https://play.google.com/store/apps/details?id=com.petzify.customer&pcampaignid=web_share";

      const appStoreUrl =
        "https://apps.apple.com/us/app/petzify-ai-pet-care-store/id6757659616";

      const websiteUrl = "https://petzify.in/";

      if (/android/i.test(userAgent)) {
        window.location.href = playStoreUrl;
      } else if (/iPad|iPhone|iPod/.test(userAgent)) {
        window.location.href = appStoreUrl;
      } else {
        window.location.href = websiteUrl;
      }
    }

    redirectToStore();
  </script>
</body>
</html>
